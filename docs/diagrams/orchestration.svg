<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="800" height="440" fill="url(#bg)"/>
  <text x="400" y="42" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="13" font-weight="600"
    letter-spacing="0.18em" fill="#94a3b8">ORCHESTRATION</text>

  <!-- metrognome conductor box — center top -->
  <rect x="260" y="68" width="280" height="90" rx="14"
    fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="18" font-weight="700"
    fill="#0f172a">metrognome</text>
  <text x="400" y="116" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="11"
    fill="#475569">menu · routing · loop · gate · ledger · memory · map</text>
  <text x="400" y="136" text-anchor="middle"
    font-family="'SF Mono',monospace" font-size="10"
    fill="#16a34a">/metrognome</text>

  <!-- four tool boxes at bottom, evenly spaced -->
  <!-- agent-device -->
  <rect x="30" y="270" width="160" height="110" rx="12"
    fill="#ffffff" stroke="rgba(15,23,42,0.1)" stroke-width="1"/>
  <text x="110" y="298" text-anchor="middle"
    font-family="'SF Mono',monospace" font-size="11" font-weight="700"
    fill="#0f172a">agent-device</text>
  <text x="110" y="316" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10"
    fill="#94a3b8">CLI</text>
  <text x="110" y="338" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">drive the app</text>
  <text x="110" y="354" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">scroll · tap · snapshot</text>
  <text x="110" y="370" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">CPU · mem · video</text>

  <!-- agent-react-devtools -->
  <rect x="210" y="270" width="160" height="110" rx="12"
    fill="#ffffff" stroke="rgba(15,23,42,0.1)" stroke-width="1"/>
  <text x="290" y="298" text-anchor="middle"
    font-family="'SF Mono',monospace" font-size="10" font-weight="700"
    fill="#0f172a">agent-react-devtools</text>
  <text x="290" y="316" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10"
    fill="#94a3b8">CLI daemon</text>
  <text x="290" y="338" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">re-render causes</text>
  <text x="290" y="354" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">slow renders</text>
  <text x="290" y="370" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">commit timeline</text>

  <!-- metro-mcp -->
  <rect x="390" y="270" width="160" height="110" rx="12"
    fill="#ffffff" stroke="rgba(15,23,42,0.1)" stroke-width="1"/>
  <text x="470" y="298" text-anchor="middle"
    font-family="'SF Mono',monospace" font-size="11" font-weight="700"
    fill="#0f172a">metro-mcp</text>
  <text x="470" y="316" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10"
    fill="#94a3b8">MCP server</text>
  <text x="470" y="338" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">Hermes CPU · heap</text>
  <text x="470" y="354" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">network · console</text>
  <text x="470" y="370" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">JS eval · profiler</text>

  <!-- react-native-best-practices -->
  <rect x="570" y="270" width="192" height="110" rx="12"
    fill="#ffffff" stroke="rgba(15,23,42,0.1)" stroke-width="1"/>
  <text x="666" y="292" text-anchor="middle"
    font-family="'SF Mono',monospace" font-size="9.5" font-weight="700"
    fill="#0f172a">react-native-best-practices</text>
  <text x="666" y="310" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10"
    fill="#94a3b8">Callstack agent-skill</text>
  <text x="666" y="332" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">which fix to try</text>
  <text x="666" y="348" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">CRITICAL/HIGH/MEDIUM</text>
  <text x="666" y="364" text-anchor="middle"
    font-family="-apple-system,'SF Pro Text',sans-serif" font-size="10.5"
    fill="#475569">guides per preset</text>

  <!-- connector lines from metrognome to each tool -->
  <line x1="310" y1="158" x2="110" y2="269" stroke="#16a34a" stroke-width="1.2"
    stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="360" y1="158" x2="290" y2="269" stroke="#16a34a" stroke-width="1.2"
    stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="440" y1="158" x2="470" y2="269" stroke="#16a34a" stroke-width="1.2"
    stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="500" y1="158" x2="666" y2="269" stroke="#16a34a" stroke-width="1.2"
    stroke-dasharray="5,3" marker-end="url(#arr)"/>


<rect x="0" y="0" width="4" height="440" fill="#16a34a"/>
</svg>
